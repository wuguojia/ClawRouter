<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Router 管理界面</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        margin-bottom: 40px;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 1.2rem;
        opacity: 0.9;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .card-title {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .stat-item {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #f0f0f0;
      }

      .stat-item:last-child {
        border-bottom: none;
      }

      .stat-label {
        color: #666;
        font-size: 0.95rem;
      }

      .stat-value {
        font-weight: 600;
        color: #333;
        font-size: 1.1rem;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .status-ok {
        background: #d4edda;
        color: #155724;
      }

      .status-warning {
        background: #fff3cd;
        color: #856404;
      }

      .status-error {
        background: #f8d7da;
        color: #721c24;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #f0f0f0;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 8px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        transition: width 0.3s ease;
      }

      .icon {
        font-size: 1.5rem;
      }

      .refresh-btn {
        background: white;
        color: #667eea;
        border: 2px solid white;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: block;
        margin: 0 auto;
      }

      .refresh-btn:hover {
        background: #667eea;
        color: white;
      }

      .metric-big {
        font-size: 2.5rem;
        font-weight: 700;
        color: #667eea;
        text-align: center;
        margin: 20px 0;
      }

      .metric-label {
        text-align: center;
        color: #666;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .loading {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🚀 API Router</h1>
        <p class="subtitle">智能 API 路由和负载均衡管理界面</p>
      </header>

      <div class="stats-grid">
        <!-- 健康状态 -->
        <div class="card">
          <div class="card-title">
            <span class="icon">💚</span>
            系统健康
          </div>
          <div class="stat-item">
            <span class="stat-label">状态</span>
            <span class="stat-value">
              <span id="health-status" class="status-badge status-ok">
                正常运行
              </span>
            </span>
          </div>
          <div class="stat-item">
            <span class="stat-label">提供商数量</span>
            <span class="stat-value" id="provider-count">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">模型数量</span>
            <span class="stat-value" id="model-count">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">智能路由</span>
            <span class="stat-value" id="smart-routing">-</span>
          </div>
        </div>

        <!-- 缓存统计 -->
        <div class="card">
          <div class="card-title">
            <span class="icon">💾</span>
            缓存统计
          </div>
          <div class="metric-big" id="cache-hit-rate">-</div>
          <div class="metric-label">命中率</div>
          <div class="stat-item">
            <span class="stat-label">缓存命中</span>
            <span class="stat-value" id="cache-hits">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">缓存未命中</span>
            <span class="stat-value" id="cache-misses">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">缓存大小</span>
            <span class="stat-value" id="cache-size">-</span>
          </div>
        </div>

        <!-- 速率限制 -->
        <div class="card">
          <div class="card-title">
            <span class="icon">⚡</span>
            速率限制
          </div>
          <div class="metric-big" id="rate-limit-accept-rate">-</div>
          <div class="metric-label">通过率</div>
          <div class="stat-item">
            <span class="stat-label">允许请求</span>
            <span class="stat-value" id="rate-limit-allowed">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">拒绝请求</span>
            <span class="stat-value" id="rate-limit-rejected">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">拒绝率</span>
            <span class="stat-value" id="rate-limit-reject-rate">-</span>
          </div>
        </div>

        <!-- 连接池 -->
        <div class="card">
          <div class="card-title">
            <span class="icon">🔌</span>
            连接池
          </div>
          <div class="stat-item">
            <span class="stat-label">活跃连接</span>
            <span class="stat-value" id="pool-active">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">空闲连接</span>
            <span class="stat-value" id="pool-idle">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">总请求数</span>
            <span class="stat-value" id="pool-total-requests">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">复用次数</span>
            <span class="stat-value" id="pool-reuse-count">-</span>
          </div>
        </div>
      </div>

      <button class="refresh-btn" onclick="loadStats()">
        🔄 刷新统计信息
      </button>
    </div>

    <script>
      const API_BASE = window.location.origin;

      async function loadHealth() {
        try {
          const response = await fetch(`${API_BASE}/health`);
          const data = await response.json();

          document.getElementById("health-status").textContent = "正常运行";
          document.getElementById("health-status").className =
            "status-badge status-ok";
          document.getElementById("provider-count").textContent =
            data.providers;
          document.getElementById("model-count").textContent = data.models;
          document.getElementById("smart-routing").textContent =
            data.smartRouting ? "✅ 启用" : "❌ 禁用";
        } catch (error) {
          document.getElementById("health-status").textContent = "连接失败";
          document.getElementById("health-status").className =
            "status-badge status-error";
          console.error("加载健康状态失败:", error);
        }
      }

      async function loadStats() {
        try {
          const response = await fetch(`${API_BASE}/stats`);
          const data = await response.json();

          // 缓存统计
          const cacheHitRate = (data.cache.hitRate * 100).toFixed(1);
          document.getElementById("cache-hit-rate").textContent =
            `${cacheHitRate}%`;
          document.getElementById("cache-hits").textContent = data.cache.hits;
          document.getElementById("cache-misses").textContent =
            data.cache.misses;
          document.getElementById("cache-size").textContent = data.cache.size;

          // 速率限制
          const rateLimitAcceptRate =
            (1 - data.rateLimit.rejectRate) * 100;
          document.getElementById("rate-limit-accept-rate").textContent =
            `${rateLimitAcceptRate.toFixed(1)}%`;
          document.getElementById("rate-limit-allowed").textContent =
            data.rateLimit.allowed;
          document.getElementById("rate-limit-rejected").textContent =
            data.rateLimit.rejected;
          document.getElementById("rate-limit-reject-rate").textContent =
            `${(data.rateLimit.rejectRate * 100).toFixed(1)}%`;

          // 连接池
          document.getElementById("pool-active").textContent =
            data.connectionPool.activeConnections;
          document.getElementById("pool-idle").textContent =
            data.connectionPool.idleConnections;
          document.getElementById("pool-total-requests").textContent =
            data.connectionPool.totalRequests;
          document.getElementById("pool-reuse-count").textContent =
            data.connectionPool.reuseCount;
        } catch (error) {
          console.error("加载统计信息失败:", error);
        }
      }

      // 初始加载
      loadHealth();
      loadStats();

      // 自动刷新（每5秒）
      setInterval(() => {
        loadHealth();
        loadStats();
      }, 5000);
    </script>
  </body>
</html>
